stages:
  - test
  - validate
  - plan
  - deploy

variables:
  TF_ROOT: ${CI_PROJECT_DIR}/terraform
  AWS_DEFAULT_REGION: us-east-1
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/

# ── Test ─────────────────────────────────────────────────────────
test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -q -r app/requirements.txt
    - pip install -q pytest pytest-cov
  script:
    - pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always

# ── Terraform validate ────────────────────────────────────────────
tf-validate:
  stage: validate
  image:
    name: hashicorp/terraform:1.6
    entrypoint: [""]
  before_script:
    - cd $TF_ROOT
    - terraform init -backend=false
  script:
    - terraform validate
    - terraform fmt -check -diff
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── Terraform plan ────────────────────────────────────────────────
tf-plan:
  stage: plan
  image:
    name: hashicorp/terraform:1.6
    entrypoint: [""]
  before_script:
    - cd $TF_ROOT
    - terraform init
  script:
    - >
      terraform plan
      -var="db_password=$TF_VAR_DB_PASSWORD"
      -out=plan.tfplan
      -input=false
  artifacts:
    name: terraform-plan
    paths:
      - terraform/plan.tfplan
      - terraform/app.zip
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── Terraform apply (manual, main branch only) ────────────────────
tf-deploy:
  stage: deploy
  image:
    name: hashicorp/terraform:1.6
    entrypoint: [""]
  dependencies:
    - tf-plan
  before_script:
    - cd $TF_ROOT
    - terraform init
  script:
    - terraform apply -input=false plan.tfplan
    - echo "APP_URL=$(terraform output -raw app_url)" >> deploy.env
  artifacts:
    reports:
      dotenv: terraform/deploy.env
  environment:
    name: production
    url: $APP_URL
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: false

# ── Terraform destroy (manual, emergency) ────────────────────────
tf-destroy:
  stage: deploy
  image:
    name: hashicorp/terraform:1.6
    entrypoint: [""]
  before_script:
    - cd $TF_ROOT
    - terraform init
  script:
    - terraform destroy -auto-approve -var="db_password=$TF_VAR_DB_PASSWORD" -input=false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: false
