stages:
  - test
  - lint
  - validate
  - plan
  - cost
  - deploy

variables:
  TF_ROOT: ${CI_PROJECT_DIR}/terraform
  AWS_DEFAULT_REGION: us-east-1
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  # Set these in GitLab → Settings → CI/CD → Variables:
  #   TF_STATE_BUCKET      e.g. shopwave-terraform-state-<account-id>
  #   TF_STATE_LOCK_TABLE  e.g. shopwave-terraform-lock
  TF_STATE_KEY: shopwave/prod/terraform.tfstate

.tf_init: &tf_init
  - cd $TF_ROOT
  - >
    terraform init
    -backend-config="bucket=$TF_STATE_BUCKET"
    -backend-config="key=$TF_STATE_KEY"
    -backend-config="region=$AWS_DEFAULT_REGION"
    -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE"
    -backend-config="encrypt=true"
    -input=false

cache:
  paths:
    - .pip-cache/

# ── Python Tests ──────────────────────────────────────────────────
test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -q -r app/requirements.txt
    - pip install -q pytest pytest-cov
  script:
    - pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always

# ── TFLint (Anton Babenko ruleset) ────────────────────────────────
tf-lint:
  stage: lint
  image:
    name: ghcr.io/terraform-linters/tflint-bundle:latest
    entrypoint: [""]
  before_script:
    - cd $TF_ROOT
    - tflint --init --config=../.tflint.hcl
  script:
    - tflint --config=../.tflint.hcl --format=compact
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

# ── Checkov Security Scan ─────────────────────────────────────────
tf-checkov:
  stage: lint
  image:
    name: bridgecrew/checkov:latest
    entrypoint: [""]
  script:
    - checkov --config-file .checkov.yaml --output junitxml > checkov-report.xml || true
    - checkov --config-file .checkov.yaml
  artifacts:
    when: always
    reports:
      junit: checkov-report.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
  allow_failure: true

# ── Terraform Validate + Fmt (no backend needed) ──────────────────
tf-validate:
  stage: validate
  image:
    name: hashicorp/terraform:1.6
    entrypoint: [""]
  before_script:
    - cd $TF_ROOT
    - terraform init -backend=false
  script:
    - terraform validate
    - terraform fmt -check -diff
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

# ── Terraform Plan ────────────────────────────────────────────────
tf-plan:
  stage: plan
  image:
    name: hashicorp/terraform:1.6
    entrypoint: [""]
  before_script:
    - *tf_init
  script:
    - >
      terraform plan
      -var="db_password=$TF_VAR_DB_PASSWORD"
      -out=plan.tfplan
      -input=false
    - terraform show -json plan.tfplan > plan.json
  artifacts:
    name: terraform-plan
    paths:
      - terraform/plan.tfplan
      - terraform/plan.json
      - terraform/app.zip
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

# ── Infracost — cost estimate before deploy ───────────────────────
infracost:
  stage: cost
  image:
    name: infracost/infracost:ci-0.10
    entrypoint: [""]
  dependencies:
    - tf-plan
  variables:
    INFRACOST_CURRENCY: USD
    INFRACOST_LOG_LEVEL: warn
  script:
    - >
      infracost breakdown
      --path terraform/plan.json
      --format json
      --out-file infracost-report.json
    - infracost output --path infracost-report.json --format table
    - infracost output --path infracost-report.json --format diff
  artifacts:
    name: infracost-report
    paths:
      - infracost-report.json
    expire_in: 7 days
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
  allow_failure: true

# ── Terraform Apply (manual, master branch only) ──────────────────
tf-deploy:
  stage: deploy
  image:
    name: hashicorp/terraform:1.6
    entrypoint: [""]
  before_script:
    - *tf_init
  script:
    - terraform apply -input=false plan.tfplan
    - echo "APP_URL=$(terraform output -raw app_url)" >> deploy.env
  artifacts:
    reports:
      dotenv: terraform/deploy.env
  environment:
    name: production
    url: $APP_URL
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: manual
  allow_failure: false
  dependencies:
    - tf-plan

# ── Terraform Destroy (manual, emergency) ─────────────────────────
tf-destroy:
  stage: deploy
  image:
    name: hashicorp/terraform:1.6
    entrypoint: [""]
  before_script:
    - *tf_init
  script:
    - terraform destroy -auto-approve -var="db_password=$TF_VAR_DB_PASSWORD" -input=false
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: manual
  allow_failure: false
